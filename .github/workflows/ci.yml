name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate required SDK docs
        run: |
          test -s README.md
          test -s agentic_dictionary.md
          test -s docs/sdk_plan.md
          test -s docs/handoff.md
      - name: Validate public agent contracts
        run: |
          for agent in agents/*; do
            if [ -d "$agent" ]; then
              test -s "$agent/README.md"
              test -s "$agent/prompt.md"
              test -s "$agent/instructions.md"
              test -s "$agent/tasks.md"
            fi
          done
      - name: Validate shell scripts
        run: |
          sh -n setup-hooks.sh
          for hook in .githooks/*; do sh -n "$hook"; done
          for hook in hooks/stages/*.sh; do sh -n "$hook"; done
      - name: Enforce spec-driven traceability
        run: |
          QF_STAGE_ENFORCE=1 sh hooks/stages/run-stage.sh spec
      - name: Enforce backtest integrity (only when a report exists)
        run: |
          QF_STAGE_ENFORCE=1 sh hooks/stages/run-stage.sh backtest
      - name: Leakage smell scan (advisory)
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          [ -n "$BASE" ] || BASE="$(git rev-parse HEAD~1 2>/dev/null || true)"
          QF_DIFF_BASE="$BASE" sh hooks/stages/run-stage.sh leakage
